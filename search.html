<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classical vs Quantum Search — N=100</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060a;
    --panel-bg: #0c0c14;
    --classical: #ff4d6a;
    --classical-dim: #3a1520;
    --quantum: #00e5cc;
    --quantum-dim: #0a2e2a;
    --found: #4dff91;
    --text: #e8e6df;
    --muted: #5a586e;
    --gold: #ffd644;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .header {
    text-align: center;
    padding: 20px 20px 8px;
  }
  .header h1 {
    font-size: clamp(20px, 3.5vw, 34px);
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--text) 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
  }
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px 12px;
    max-width: 1300px;
    margin: 0 auto;
  }
  @media (max-width: 750px) {
    .panels { grid-template-columns: 1fr; }
  }
  .panel {
    background: var(--panel-bg);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .panel-header {
    padding: 10px 14px 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-title { font-size: 14px; font-weight: 700; }
  .panel-title.classical { color: var(--classical); }
  .panel-title.quantum { color: var(--quantum); }
  .complexity {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 5px;
    font-weight: 600;
  }
  .complexity.classical { background: var(--classical-dim); color: var(--classical); }
  .complexity.quantum { background: var(--quantum-dim); color: var(--quantum); }
  .canvas-wrap {
    width: 100%;
    height: 340px;
    position: relative;
  }
  .canvas-wrap canvas { width: 100% !important; height: 100% !important; display: block; }
  .status-bar {
    padding: 8px 14px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 36px;
  }
  .status-text { color: var(--muted); }
  .status-text.found { color: var(--found); font-weight: 600; }
  .step-count { font-weight: 700; font-size: 13px; }
  .step-count.classical { color: var(--classical); }
  .step-count.quantum { color: var(--quantum); }
  .controls {
    text-align: center;
    padding: 6px 16px 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn {
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 9px 28px;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-start {
    background: linear-gradient(135deg, var(--classical), var(--quantum));
    color: #000;
  }
  .btn-start:hover { transform: scale(1.04); filter: brightness(1.1); }
  .btn-start:disabled { opacity: 0.4; cursor: default; transform: none; }
  .btn-reset {
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-reset:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .speed-ctrl {
    display: flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted);
  }
  .speed-ctrl input { width: 80px; accent-color: var(--quantum); }
  .legend {
    display: flex;
    justify-content: center;
    gap: 18px;
    padding: 0 12px 12px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    flex-wrap: wrap;
  }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .result-banner {
    text-align: center;
    padding: 0 16px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--gold);
    min-height: 20px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Classical vs Quantum Search</h1>
  <p>N = 100 items &nbsp;·&nbsp; O(N) vs O(√N) &nbsp;·&nbsp; target at index 85</p>
</div>

<div class="panels">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title classical">Classical Linear Search</div>
      <div class="complexity classical">O(N) = 100 worst case</div>
    </div>
    <div class="canvas-wrap" id="classical-canvas"></div>
    <div class="status-bar">
      <div class="status-text" id="c-status">Ready</div>
      <div class="step-count classical" id="c-steps">0 / 100</div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title quantum">Grover's Quantum Search</div>
      <div class="complexity quantum">O(√N) ≈ 8 iterations</div>
    </div>
    <div class="canvas-wrap" id="quantum-canvas"></div>
    <div class="status-bar">
      <div class="status-text" id="q-status">Ready</div>
      <div class="step-count quantum" id="q-steps">0 / 8</div>
    </div>
  </div>
</div>

<div class="result-banner" id="result-banner"></div>

<div class="legend">
  <span><span class="dot" style="background:var(--muted)"></span> Unchecked</span>
  <span><span class="dot" style="background:var(--classical)"></span> Checking</span>
  <span><span class="dot" style="background:#1a1a24"></span> Rejected</span>
  <span><span class="dot" style="background:var(--quantum)"></span> Superposition</span>
  <span><span class="dot" style="background:var(--gold)"></span> Amplified</span>
  <span><span class="dot" style="background:var(--found)"></span> Found</span>
</div>

<div class="controls">
  <button class="btn btn-start" id="start-btn" onclick="startSearch()">Run Both</button>
  <button class="btn btn-reset" onclick="resetAll()">Reset</button>
  <div class="speed-ctrl">
    <label>Quantum speed</label>
    <input type="range" min="5" max="100" value="100" step="5" id="speed-slider">
    <span id="speed-label">1.0×</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const N = 100;
const COLS = 10, ROWS = 10;
const TARGET = 85;
const GROVER_ITERS = Math.round(Math.PI / 4 * Math.sqrt(N));
const SPACING = 0.72;
const CUBE_SIZE = 0.52;

const COL = {
  unchecked:  new THREE.Color(0x2a2a3e),
  cCheck:     new THREE.Color(0xff4d6a),
  cGrey:      new THREE.Color(0x111118),
  qSuper:     new THREE.Color(0x00e5cc),
  qAmp:       new THREE.Color(0xffd644),
  qDim:       new THREE.Color(0x0a1612),
  found:      new THREE.Color(0x4dff91),
  orange:     new THREE.Color(0xff8800),
};

function createPanel(id) {
  const container = document.getElementById(id);
  const w = container.clientWidth || 500;
  const h = container.clientHeight || 340;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0c0c14);

  const camera = new THREE.PerspectiveCamera(40, w / h, 0.1, 200);
  camera.position.set(0, 7, 10);
  camera.lookAt(0, -0.5, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const d = new THREE.DirectionalLight(0xffffff, 0.65);
  d.position.set(4, 8, 5);
  scene.add(d);
  const p = new THREE.PointLight(0xffffff, 0.25);
  p.position.set(-3, 5, 4);
  scene.add(p);

  const group = new THREE.Group();
  const cubes = [];
  const bars = [];

  const ox = -(COLS - 1) * SPACING / 2;
  const oz = -(ROWS - 1) * SPACING / 2;

  for (let i = 0; i < N; i++) {
    const col = i % COLS;
    const row = Math.floor(i / COLS);

    const geo = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);
    const mat = new THREE.MeshPhongMaterial({
      color: COL.unchecked, emissive: 0x000000,
      shininess: 50, transparent: true, opacity: 0.9,
    });
    const cube = new THREE.Mesh(geo, mat);
    cube.position.set(ox + col * SPACING, 0, oz + row * SPACING);
    cube.userData = { baseY: 0 };
    group.add(cube);
    cubes.push(cube);

    const bGeo = new THREE.BoxGeometry(CUBE_SIZE * 0.55, 0.01, CUBE_SIZE * 0.55);
    const bMat = new THREE.MeshPhongMaterial({
      color: 0x00e5cc, emissive: 0x000000,
      transparent: true, opacity: 0,
    });
    const bar = new THREE.Mesh(bGeo, bMat);
    bar.position.set(ox + col * SPACING, -0.45, oz + row * SPACING);
    group.add(bar);
    bars.push(bar);
  }

  scene.add(group);
  group.position.y = -1.5;

  return { scene, camera, renderer, cubes, bars, group, container };
}

const cPanel = createPanel('classical-canvas');
const qPanel = createPanel('quantum-canvas');

let cState = { running: false, step: -1, found: false, timer: 0 };
let qState = { running: false, iter: 0, phase: 'idle', found: false, timer: 0, amps: null };

function getQuantumSpeed() { return parseFloat(document.getElementById('speed-slider').value) / 100; }
document.getElementById('speed-slider').addEventListener('input', e => {
  const v = (parseFloat(e.target.value) / 100).toFixed(2);
  document.getElementById('speed-label').textContent = v + '×';
});

function resetCubes(panel) {
  panel.cubes.forEach(c => {
    c.material.color.copy(COL.unchecked);
    c.material.emissive.set(0x000000);
    c.material.opacity = 0.9;
    c.position.y = c.userData.baseY;
    c.scale.set(1, 1, 1);
  });
  panel.bars.forEach(b => {
    b.scale.y = 0.01;
    b.material.opacity = 0;
    b.material.color.set(0x00e5cc);
  });
}

function resetAll() {
  cState = { running: false, step: -1, found: false, timer: 0 };
  qState = { running: false, iter: 0, phase: 'idle', found: false, timer: 0, amps: null };
  resetCubes(cPanel);
  resetCubes(qPanel);
  document.getElementById('c-status').textContent = 'Ready';
  document.getElementById('c-status').className = 'status-text';
  document.getElementById('c-steps').textContent = '0 / 100';
  document.getElementById('q-status').textContent = 'Ready';
  document.getElementById('q-status').className = 'status-text';
  document.getElementById('q-steps').textContent = `0 / ${GROVER_ITERS}`;
  document.getElementById('result-banner').textContent = '';
  document.getElementById('start-btn').disabled = false;
  bothDone = false;
}

function startSearch() {
  resetAll();
  document.getElementById('start-btn').disabled = true;
  cState = { running: true, step: -1, found: false, timer: 0 };
  qState = {
    running: true, iter: 0, phase: 'superposition', found: false, timer: 0,
    amps: new Float32Array(N).fill(1 / Math.sqrt(N)),
    subphase: 'oracle', diffApplied: false,
  };
}

let bothDone = false;

function checkBothDone() {
  if (cState.found && qState.found && !bothDone) {
    bothDone = true;
    const cSteps = cState.step + 1;
    document.getElementById('result-banner').textContent =
      `Classical: ${cSteps} steps  ·  Grover: ${GROVER_ITERS} iterations  ·  ${Math.round(cSteps / GROVER_ITERS)}× speedup`;
  }
}

function updateClassical(dt) {
  if (!cState.running || cState.found) return;
  cState.timer += dt;

  const interval = 0.35;
  if (cState.timer >= interval && !cState.found) {
    cState.timer -= interval;
    cState.step++;
    const i = cState.step;
    if (i >= N) { cState.running = false; return; }

    const cube = cPanel.cubes[i];
    if (i === TARGET) {
      cState.found = true;
      cState.running = false;
      // Grey out previous cube
      if (i > 0) {
        const prev = cPanel.cubes[i - 1];
        prev.material.color.copy(COL.cGrey);
        prev.material.emissive.set(0x000000);
        prev.material.opacity = 0.25;
        prev.scale.set(0.7, 0.7, 0.7);
      }
      cube.material.color.copy(COL.found);
      cube.material.emissive.set(0x1a4d2a);
      cube.scale.set(1.3, 1.3, 1.3);
      cube.position.y = cube.userData.baseY + 0.5;
      document.getElementById('c-status').textContent = `Found at index ${TARGET}!`;
      document.getElementById('c-status').className = 'status-text found';
      checkBothDone();
    } else {
      // Flash red briefly — will grey out on next step
      cube.material.color.copy(COL.cCheck);
      cube.material.emissive.set(0x3a0a14);
      cube.material.opacity = 0.95;
      cube.scale.set(1.05, 1.05, 1.05);
      // Grey out the PREVIOUS cube (the one before this was the flash)
      if (i > 0 && i - 1 !== TARGET) {
        const prev = cPanel.cubes[i - 1];
        prev.material.color.copy(COL.cGrey);
        prev.material.emissive.set(0x000000);
        prev.material.opacity = 0.25;
        prev.scale.set(0.7, 0.7, 0.7);
      }
      document.getElementById('c-status').textContent = `Checking index ${i}... not the target`;
    }
    document.getElementById('c-steps').textContent = `${cState.step + 1} / 100`;
  }
}

function lerp(a, b, t) { return a + (b - a) * t; }

function updateQuantum(dt) {
  if (!qState.running || qState.found) return;
  qState.timer += dt * getQuantumSpeed();
  const amps = qState.amps;
  const TICK = 0.35;  // same as classical step interval
  const lerpRate = 0.12;

  // Superposition phase runs quickly at start (not counted as a "query")
  if (qState.phase === 'superposition') {
    document.getElementById('q-status').textContent = 'Hadamard → superposition';

    qPanel.cubes.forEach(c => {
      c.material.color.lerp(COL.qSuper, 0.08);
      c.material.emissive.lerp(new THREE.Color(0x00524a), 0.08);
      c.material.opacity = lerp(c.material.opacity, 0.95, 0.08);
    });
    qPanel.bars.forEach(b => {
      b.scale.y = lerp(b.scale.y, 6, 0.08);
      b.material.opacity = lerp(b.material.opacity, 0.35, 0.08);
    });

    if (qState.timer > 0.8) {
      qState.timer = 0;
      qState.phase = 'iterate';
      qState.iter = 0;
      qState.subphase = 'oracle';
    }
    return;
  }

  // Each TICK = one full Grover iteration (oracle mark + diffusion amplify)
  if (qState.phase === 'iterate') {

    // Smooth visual interpolation every frame
    let maxP = 0;
    const probs = new Float32Array(N);
    for (let i = 0; i < N; i++) {
      probs[i] = amps[i] * amps[i];
      if (probs[i] > maxP) maxP = probs[i];
    }

    qPanel.cubes.forEach((c, i) => {
      const p = probs[i];
      const ratio = maxP > 0 ? p / maxP : 1 / N;
      if (i === TARGET) {
        const t = new THREE.Color().lerpColors(COL.qSuper, COL.qAmp, Math.min(ratio, 1));
        c.material.color.lerp(t, lerpRate);
        c.material.emissive.lerp(new THREE.Color(0x4a3800), lerpRate);
        const sc = 1 + ratio * 0.35;
        c.scale.set(lerp(c.scale.x, sc, lerpRate), lerp(c.scale.y, sc, lerpRate), lerp(c.scale.z, sc, lerpRate));
        c.position.y = lerp(c.position.y, c.userData.baseY + ratio * 0.5, lerpRate);
        c.material.opacity = lerp(c.material.opacity, 1, lerpRate);
      } else {
        const t = new THREE.Color().lerpColors(COL.qDim, COL.qSuper, Math.min(ratio * 4, 1));
        c.material.color.lerp(t, lerpRate);
        c.material.emissive.lerp(new THREE.Color(0x001510), lerpRate * 0.5);
        c.material.opacity = lerp(c.material.opacity, 0.5 + ratio * 1.5, lerpRate);
        const sc = 0.8 + ratio * 0.6;
        c.scale.set(lerp(c.scale.x, sc, lerpRate * 0.5), lerp(c.scale.y, sc, lerpRate * 0.5), lerp(c.scale.z, sc, lerpRate * 0.5));
      }
    });

    qPanel.bars.forEach((b, i) => {
      const targetH = Math.max((maxP > 0 ? probs[i] / maxP : 1) * 35, 0.3);
      b.scale.y = lerp(b.scale.y, targetH, lerpRate);
      if (i === TARGET) {
        b.material.color.lerp(new THREE.Color(0xffd644), lerpRate);
        b.material.opacity = lerp(b.material.opacity, 0.75, lerpRate);
      } else {
        b.material.color.lerp(new THREE.Color(0x00e5cc), lerpRate * 0.5);
        b.material.opacity = lerp(b.material.opacity, 0.12, lerpRate);
      }
    });

    // Oracle flash on target cube in first half of tick
    if (qState.subphase === 'oracle') {
      const tc = qPanel.cubes[TARGET];
      tc.material.color.lerp(COL.orange, 0.15);
      tc.material.emissive.lerp(new THREE.Color(0x4a2200), 0.15);
      document.getElementById('q-status').textContent = `Iter ${qState.iter + 1}/${GROVER_ITERS}: Oracle marks target`;

      if (qState.timer > TICK * 0.4) {
        // Apply oracle
        amps[TARGET] *= -1;
        qState.subphase = 'diffuse';
      }
    }

    // Diffusion in second half of tick
    if (qState.subphase === 'diffuse') {
      document.getElementById('q-status').textContent = `Iter ${qState.iter + 1}/${GROVER_ITERS}: Diffusion amplifies`;

      if (!qState.diffApplied) {
        let mean = 0;
        for (let i = 0; i < N; i++) mean += amps[i];
        mean /= N;
        for (let i = 0; i < N; i++) amps[i] = 2 * mean - amps[i];
        qState.diffApplied = true;
      }
    }

    // One tick done — advance to next iteration
    if (qState.timer >= TICK) {
      qState.timer -= TICK;
      qState.iter++;
      document.getElementById('q-steps').textContent = `${qState.iter} / ${GROVER_ITERS}`;

      if (qState.iter >= GROVER_ITERS) {
        qState.phase = 'measure';
        qState.timer = 0;
      } else {
        qState.subphase = 'oracle';
        qState.diffApplied = false;
      }
    }
    return;
  }

  // Measurement
  if (qState.phase === 'measure') {
    document.getElementById('q-status').textContent = 'Measuring...';

    if (qState.timer > 0.3 && !qState.found) {
      qState.found = true;
      qState.running = false;

      qPanel.cubes.forEach((c, i) => {
        if (i === TARGET) {
          c.material.color.copy(COL.found);
          c.material.emissive.set(0x1a6d3a);
          c.scale.set(1.3, 1.3, 1.3);
          c.position.y = c.userData.baseY + 0.6;
          c.material.opacity = 1;
        } else {
          c.material.color.set(0x151520);
          c.material.emissive.set(0x000000);
          c.material.opacity = 0.35;
          c.scale.set(0.75, 0.75, 0.75);
        }
      });
      qPanel.bars.forEach((b, i) => {
        if (i === TARGET) {
          b.material.color.set(0x4dff91);
          b.material.opacity = 0.9;
          b.scale.y = 50;
        } else {
          b.material.opacity = 0;
          b.scale.y = 0.01;
        }
      });

      document.getElementById('q-status').textContent = `Found at index ${TARGET}!`;
      document.getElementById('q-status').className = 'status-text found';
      checkBothDone();
    }
  }
}

let prevTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prevTime) / 1000, 0.05);
  prevTime = now;

  updateClassical(dt);
  updateQuantum(dt);

  const t = now * 0.001;
  cPanel.group.rotation.y = Math.sin(t * 0.12) * 0.06;
  qPanel.group.rotation.y = Math.sin(t * 0.12 + 0.4) * 0.06;

  cPanel.renderer.render(cPanel.scene, cPanel.camera);
  qPanel.renderer.render(qPanel.scene, qPanel.camera);
}
animate();

window.addEventListener('resize', () => {
  [cPanel, qPanel].forEach(p => {
    const w = p.container.clientWidth;
    const h = p.container.clientHeight;
    p.camera.aspect = w / h;
    p.camera.updateProjectionMatrix();
    p.renderer.setSize(w, h);
  });
});
</script>
</body>
</html>
